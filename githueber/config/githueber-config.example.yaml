# Repository definitions
repositories:
  frontend:
    owner: "your-org"
    repo: "frontend-repo"
    local_repo_path: "/path/to/frontend-repo"
    # Optional per-repository override. If unset, falls back to execution.harness
    # or the gbr start --harness flag for this daemon run.
    harness: "opencode"
    labels:
      queue_label: "agent-queue"
      processing_label: "agent-processing"
      await_plan_label: "await-plan"
      completed_label: "agent-completed"
      failed_label: "agent-failed"
      revising_label: "agent-revising"
    agent_mapping:
      "bug-fix": "github-worker-agent"
      "feature-request": "github-worker-agent"
      "epic": "github-orchestrator-agent"
      "refactor": "github-orchestrator-agent"

  backend:
    owner: "your-org"
    repo: "backend-repo"
    local_repo_path: "/path/to/backend-repo"
    harness: "codex"
    labels:
      queue_label: "agent-queue"
      processing_label: "agent-processing"
      await_plan_label: "await-plan"
      completed_label: "agent-completed"
      failed_label: "agent-failed"
      revising_label: "agent-revising"
    agent_mapping:
      "bug-fix": "github-worker-agent"
      "feature-request": "github-worker-agent"
      "epic": "github-orchestrator-agent"
      "refactor": "github-orchestrator-agent"

execution:
  # Global default harness when a repository does not set its own harness.
  harness: "opencode"
  auto_approve: false
  concurrency: 1
  approval_comment: "/approve"
  revise_comment: "/revise"
  opencode_model: null
  timeout: 3600

polling:
  interval_ms: 300000

opencode:
  endpoint: "http://127.0.0.1:9000"

codex:
  command: "codex"
  args: "app-server"
  model: "gpt-5.4"
  approval_policy: "on-request"
  sandbox: "workspace-write"

ipc:
  socket_path: "/tmp/githueber.sock"

isolation:
  # Set to an absolute parent directory to create per-issue worktrees,
  # or keep null/false to work directly in local_repo_path.
  worktrees: null

logging:
  log_level: "info"
