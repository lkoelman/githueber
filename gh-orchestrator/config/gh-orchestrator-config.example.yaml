# GitHub Orchestrator Configuration
# Copy this file to gh-orchestrator-config.yaml and customize

# GitHub repository settings
github:
  # Repository owner (organization or user)
  repo_owner: "your-org"
  
  # Repository name
  repo_name: "your-repo"
  
  # Path to the repository where OpenCode will execute
  # This is where the actual code changes will be made
  target_repo_path: "/path/to/your/repo"

# Label configuration
# These labels control the issue processing workflow
labels:
  # Issues with this label will be picked up for processing
  queue_label: "agent-queue"
  
  # Applied when an issue is being processed
  processing_label: "agent-processing"
  
  # Applied when a plan is generated and awaiting approval
  await_plan_label: "await-plan"
  
  # Applied when an issue is successfully completed
  completed_label: "agent-completed"
  
  # Applied when processing fails
  failed_label: "agent-failed"
  
  # Applied when a plan is being revised
  revising_label: "agent-revising"

# Agent mapping
# Map issue labels to specific OpenCode agents
# Issues with these labels will use the specified agent directly
# Issues without a mapping will use plan/build mode
agent_mapping:
  "bug-fix": "bug-fixer-agent"
  "feature-request": "feature-builder-agent"
  "refactor": "refactoring-agent"
  "documentation": "docs-writer-agent"

# Execution settings
execution:
  # Auto-approve plans without waiting for user approval
  # If false, plans will be posted as comments and await approval
  auto_approve: false
  
  # Maximum number of issues to process in parallel
  # Set to 1 for sequential processing (safer)
  concurrency: 1
  
  # Comment text that triggers plan approval
  # User comments starting with this will approve and execute the plan
  approval_comment: "/approve"
  
  # Comment text that triggers plan revision
  # User comments starting with this will revise the plan
  revise_comment: "/revise"
  
  # Optional: Override OpenCode model
  # Leave as null to use default
  opencode_model: null
  
  # Timeout for OpenCode execution (seconds)
  timeout: 3600

# Whiteboard configuration
# The whiteboard tracks active jobs and provides coordination
whiteboard:
  # Path to whiteboard markdown file
  path: "whiteboard/whiteboard.md"
  
  # Lock timeout in seconds
  # If a lock is held longer than this, it may be stale
  lock_timeout: 3600

# Logging configuration
logging:
  # Path to log file
  log_file: "logs/gh-orchestrator.log"
  
  # Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
  log_level: "INFO"

# CRON configuration
cron:
  # CRON schedule expression
  # Examples:
  #   */5 * * * *   - Every 5 minutes
  #   */15 * * * *  - Every 15 minutes
  #   0 * * * *     - Every hour
  #   0 9 * * *     - Every day at 9 AM
  schedule: "*/15 * * * *"
  
  # Enable CRON job
  enabled: true
